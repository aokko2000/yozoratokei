; 夜空時計 (yozoratokei) — M5Stack CoreS3 (ESP32-S3, 2.0" IPS 320x240, BMI270+BMM150)
; 公式ドキュメント: https://docs.m5stack.com/ja/core/CoreS3

[env:m5stack-cores3]
platform = espressif32 @ 6.12.0
board = m5stack-cores3
framework = arduino
board_build.partitions = default_16MB.csv
monitor_speed = 115200
monitor_echo = yes
monitor_filters = send_on_enter
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    m5stack/M5GFX @ ^0.2.9
    m5stack/M5CoreS3
